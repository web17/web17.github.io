---
layout: default
---

<div id="dummy">
  <h1>Hello</h1>
  <ul>
    {% for post in site.posts %}
      {% if post.layout != "none" %}
      <li>{% if post.category == "speaking" %}<i class="fa fa-microphone"></i>
        
        {% endif %}<a href="{{ post.url }}">{{ post.title }}</a><span> &raquo; {{ post.date | date: "%B %d, %Y" }}</span></li>
      {% endif %}
    {% endfor %}
  </ul>
</div>
